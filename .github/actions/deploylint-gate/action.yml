name: Deploylint gate
description: Run Deploylint as a blocking gate by default; switch to advisory mode only for non-blocking reports.
branding:
  icon: shield
  color: blue

inputs:
  url:
    description: Production or staging URL to scan (HTTPS)
    required: true
  api:
    description: Deploylint API base URL
    required: false
    default: https://deploylint.com
  min_score:
    description: Minimum launch score (0-100)
    required: false
    default: '80'
  mode:
    description: gate (fail on blockers) or advisory (report only)
    required: false
    default: gate
  fetch_timeout_ms:
    description: Per-request timeout for Deploylint and GitHub API calls
    required: false
    default: '30000'
  fetch_retries:
    description: Retry count for transient network failures
    required: false
    default: '2'
  fetch_retry_delay_ms:
    description: Initial retry delay for transient network failures
    required: false
    default: '500'

runs:
  using: composite
  steps:
    - name: Run Deploylint
      shell: bash
      env:
        DEPLOYLINT_URL: ${{ inputs.url }}
        DEPLOYLINT_API: ${{ inputs.api }}
        DEPLOYLINT_MIN_SCORE: ${{ inputs.min_score }}
        DEPLOYLINT_MODE: ${{ inputs.mode }}
        DEPLOYLINT_FETCH_TIMEOUT_MS: ${{ inputs.fetch_timeout_ms }}
        DEPLOYLINT_FETCH_RETRIES: ${{ inputs.fetch_retries }}
        DEPLOYLINT_FETCH_RETRY_DELAY_MS: ${{ inputs.fetch_retry_delay_ms }}
      run: |
        set -euo pipefail
        if [ -z "${DEPLOYLINT_URL:-}" ]; then
          if [ "${DEPLOYLINT_MODE:-advisory}" = "gate" ]; then
            echo "DEPLOYLINT_URL is required for Deploylint gate mode." >&2
            exit 2
          fi
          echo "Skipping Deploylint advisory report because DEPLOYLINT_URL is unavailable (forked pull request secrets are not exposed)."
          exit 0
        fi
        node "$GITHUB_ACTION_PATH/gate-remote.mjs" "${DEPLOYLINT_URL}"
