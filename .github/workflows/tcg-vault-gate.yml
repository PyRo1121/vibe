name: TCG Vault gate

on:
  push:
    branches: [main]
    paths:
      - 'apps/tcg-vault/**'
      - 'package.json'
      - 'package-lock.json'
      - 'knip.tcg-vault.jsonc'
      - 'turbo.json'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - '.nvmrc'
      - '.github/workflows/tcg-vault-gate.yml'
  pull_request:
    paths:
      - 'apps/tcg-vault/**'
      - 'package.json'
      - 'package-lock.json'
      - 'knip.tcg-vault.jsonc'
      - 'turbo.json'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - '.nvmrc'
      - '.github/workflows/tcg-vault-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tcg-vault-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify TCG Vault
        run: npm run verify:tcg-vault:ci

      - name: Upload TCG Vault failure artifacts
        if: failure()
        # actions/upload-artifact v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: tcg-vault-failure-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            apps/tcg-vault/coverage/**
            apps/tcg-vault/playwright-report/**
            apps/tcg-vault/test-results/**
