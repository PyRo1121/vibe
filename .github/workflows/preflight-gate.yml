name: Deploylint gate

on:
  push:
    branches: [main]
    paths:
      - 'apps/preflight/**'
      - 'apps/preflight-mcp/**'
      - 'apps/deploylint-shared/**'
      - '.github/actions/deploylint-gate/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'knip.deploylint.jsonc'
      - 'renovate.json'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - 'svelte.config.js'
      - '.github/dependabot.yml'
      - '.nvmrc'
      - 'scripts/assert-unlighthouse.mjs'
      - 'scripts/benchmark-lighthouse.mjs'
      - '.github/workflows/preflight-gate.yml'
      - '.github/workflows/deploylint-dogfood.yml'
      - '.github/workflows/tcg-vault-gate.yml'
  pull_request:
    paths:
      - 'apps/preflight/**'
      - 'apps/preflight-mcp/**'
      - 'apps/deploylint-shared/**'
      - '.github/actions/deploylint-gate/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'knip.deploylint.jsonc'
      - 'renovate.json'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - 'svelte.config.js'
      - '.github/dependabot.yml'
      - '.nvmrc'
      - 'scripts/assert-unlighthouse.mjs'
      - 'scripts/benchmark-lighthouse.mjs'
      - '.github/workflows/preflight-gate.yml'
      - '.github/workflows/deploylint-dogfood.yml'
      - '.github/workflows/tcg-vault-gate.yml'
  workflow_dispatch:
    inputs:
      url:
        description: URL to scan (overrides secret)
        required: false
        type: string
      min_score:
        description: Minimum launch score
        required: false
        default: '80'
        type: string

permissions:
  contents: read

concurrency:
  group: deploylint-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # actions/checkout v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Dependency Review
        # actions/dependency-review-action v5.0.0
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          fail-on-severity: moderate

  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # actions/checkout v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Deploylint CI suite
        run: npm run verify:deploylint:ci

      - name: Upload Deploylint failure artifacts
        if: failure()
        # actions/upload-artifact v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: deploylint-failure-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            apps/deploylint-shared/coverage/**
            apps/deploylint-shared/test-results/**
            apps/preflight/coverage/**
            apps/preflight/playwright-report/**
            apps/preflight/test-results/**
            apps/preflight-mcp/coverage/**
            apps/preflight-mcp/test-results/**

      - name: Require production gate URL on main pushes
        if: github.event_name == 'push'
        env:
          PREFLIGHT_GATE_URL: ${{ secrets.PREFLIGHT_GATE_URL }}
          DEPLOYLINT_GATE_URL: ${{ secrets.DEPLOYLINT_GATE_URL }}
        run: |
          if [ -z "${PREFLIGHT_GATE_URL}${DEPLOYLINT_GATE_URL}" ]; then
            echo "::error::Set PREFLIGHT_GATE_URL or DEPLOYLINT_GATE_URL so main pushes run the production Deploylint gate."
            exit 2
          fi

      - name: Scan production URL
        env:
          PREFLIGHT_URL: ${{ github.event.inputs.url || secrets.PREFLIGHT_GATE_URL || secrets.DEPLOYLINT_GATE_URL }}
          PREFLIGHT_MIN_SCORE: ${{ github.event.inputs.min_score || '80' }}
          PREFLIGHT_API: https://deploylint.com
        run: |
          if [ -z "$PREFLIGHT_URL" ]; then
            echo "Skipping URL gate - provide workflow_dispatch url or set PREFLIGHT_GATE_URL (or DEPLOYLINT_GATE_URL)."
            exit 0
          fi
          npm run gate -w preflight -- "$PREFLIGHT_URL"
