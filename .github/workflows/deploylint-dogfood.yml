name: Deploylint dogfood

on:
  pull_request:
    paths:
      - "apps/preflight/**"
      - "apps/preflight-mcp/**"
      - "apps/deploylint-shared/**"
      - ".github/actions/deploylint-gate/**"
      - "package.json"
      - "package-lock.json"
      - "turbo.json"
      - "knip.deploylint.jsonc"
      - ".oxlintrc.jsonc"
      - ".oxfmtrc.jsonc"
      - ".nvmrc"
      - ".github/workflows/preflight-gate.yml"
      - ".github/workflows/deploylint-dogfood.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify MCP package
        run: npm run verify -w preflight-mcp

      - name: Gate deploylint.com
        uses: ./.github/actions/deploylint-gate
        with:
          url: https://deploylint.com
          min_score: "70"
          mode: advisory
