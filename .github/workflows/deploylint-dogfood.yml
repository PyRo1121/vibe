name: Deploylint dogfood

on:
  push:
    branches: [main]
    paths:
      - 'apps/preflight/**'
      - 'apps/preflight-mcp/**'
      - 'apps/deploylint-shared/**'
      - '.github/actions/deploylint-gate/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'knip.deploylint.jsonc'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - 'svelte.config.js'
      - '.github/dependabot.yml'
      - '.nvmrc'
      - 'scripts/assert-unlighthouse.mjs'
      - 'scripts/benchmark-lighthouse.mjs'
      - '.github/workflows/preflight-gate.yml'
      - '.github/workflows/deploylint-dogfood.yml'
  pull_request:
    paths:
      - 'apps/preflight/**'
      - 'apps/preflight-mcp/**'
      - 'apps/deploylint-shared/**'
      - '.github/actions/deploylint-gate/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'knip.deploylint.jsonc'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - 'svelte.config.js'
      - '.github/dependabot.yml'
      - '.nvmrc'
      - 'scripts/assert-unlighthouse.mjs'
      - 'scripts/benchmark-lighthouse.mjs'
      - '.github/workflows/preflight-gate.yml'
      - '.github/workflows/deploylint-dogfood.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploylint-dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify MCP package
        run: npm run verify -w preflight-mcp

      - name: Gate deploylint.com
        uses: ./.github/actions/deploylint-gate
        with:
          url: https://deploylint.com
          min_score: '80'
          mode: gate

      - name: Upload dogfood failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: deploylint-dogfood-failure-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            apps/preflight-mcp/coverage/**
            apps/preflight-mcp/test-results/**
