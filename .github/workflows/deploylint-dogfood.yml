name: Deploylint dogfood

on:
  pull_request:
    paths:
      - "apps/preflight/**"
      - "apps/preflight-mcp/**"
      - ".github/actions/deploylint-gate/**"
      - ".github/workflows/deploylint-dogfood.yml"
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify MCP package
        run: npm run verify -w preflight-mcp

      - name: Gate deploylint.com
        uses: ./.github/actions/deploylint-gate
        with:
          url: https://deploylint.com
          min_score: "70"
          mode: advisory
