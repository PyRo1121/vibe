name: Deploylint dogfood

on:
  push:
    branches: [main]
    paths:
      - 'apps/preflight/**'
      - 'apps/preflight-mcp/**'
      - 'apps/deploylint-shared/**'
      - '.github/actions/deploylint-gate/**'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
      - 'knip.deploylint.jsonc'
      - 'renovate.json'
      - '.oxlintrc.jsonc'
      - '.oxfmtrc.jsonc'
      - 'svelte.config.js'
      - '.github/dependabot.yml'
      - '.nvmrc'
      - 'scripts/assert-deploylint-coverage.mjs'
      - 'scripts/assert-unlighthouse.mjs'
      - 'scripts/benchmark-lighthouse.mjs'
      - '.github/workflows/preflight-gate.yml'
      - '.github/workflows/deploylint-dogfood.yml'
      - '.github/workflows/tcg-vault-gate.yml'
  schedule:
    - cron: '17 11 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploylint-dogfood-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # actions/checkout v7
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # actions/setup-node v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify npm registry signatures
        run: npm run audit:signatures

      - name: Verify MCP package
        run: npm run verify -w preflight-mcp

      - name: Gate deploylint.com
        uses: ./.github/actions/deploylint-gate
        with:
          url: https://deploylint.com
          min_score: '80'
          mode: gate

      - name: Smoke deploylint.com
        run: npm run smoke:preflight

      - name: Benchmark deploylint.com
        run: npm run bench:site:ci

      - name: Upload dogfood failure artifacts
        if: failure()
        # actions/upload-artifact v6
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: deploylint-dogfood-failure-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            apps/preflight-mcp/coverage/**
            apps/preflight-mcp/test-results/**
            tmp/unlighthouse/**
